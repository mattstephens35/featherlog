services:
  mysql:
    image: mysql:8.0
    container_name: featherlog-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: featherlog
      MYSQL_USER: featherlog
      MYSQL_PASSWORD: featherlog
      MYSQL_ROOT_PASSWORD: featherlog_root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfeatherlog_root"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: featherlog-api
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: featherlog
      DB_USERNAME: featherlog
      DB_PASSWORD: featherlog
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173,http://localhost:8081
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: featherlog-web
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mysql-data:
